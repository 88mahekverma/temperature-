<!DOCTYPE html>
<html>
<head>
  <title>ESP32 LED Control</title>
</head>
<body>

<h2>LED Control Panel</h2>

<!-- Buttons -->
<button onclick="setLED('red',1)">RED ON</button>
<button onclick="setLED('red',0)">RED OFF</button>

<br><br>

<button onclick="setLED('green',1)">GREEN ON</button>
<button onclick="setLED('green',0)">GREEN OFF</button>

<br><br>

<button onclick="setLED('blue',1)">BLUE ON</button>
<button onclick="setLED('blue',0)">BLUE OFF</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyANoU7Fkz1izOCnJDR2TX0-YrY7nNF3d20",
  authDomain: "temperature-448aa.firebaseapp.com",
  databaseURL: "https://temperature-448aa-default-rtdb.asia-southeast1.firebasedatabase.app/database.json",
  projectId: "temperature-448aa",
  storageBucket: "temperature-448aa.firebasestorage.app",
  messagingSenderId: "615581732215",
  appId: "1:615581732215:web:b94355bdd96204df42a572",
  measurementId: "G-728K8BT7GP"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Function to update LED values
window.setLED = function(led, value) {
  set(ref(db, "led/" + led), value)
    .then(() => {
      console.log(led + " updated to " + value);
    })
    .catch((error) => {
      console.log("Error: ", error);
    });
}
</script>

</body>
</html>
